{{- if .Values.enabled }}
apiVersion: external-secrets.io/v1
kind: ClusterSecretStore
metadata:
  name: aws-secrets-manager-cluster-secretstore
spec:
  provider:
    aws:
      service: SecretsManager
      region: {{ .Values.aws.region }}
      # Explicit IRSA: ClusterSecretStore requires namespace on serviceAccountRef.
      # Without this, store validation often fails on Fargate (no IMDS credential chain).
      auth:
        jwt:
          serviceAccountRef:
            name: {{ .Values.serviceAccount.name }}
            namespace: {{ .Values.serviceAccount.namespace }}
{{- end }}
