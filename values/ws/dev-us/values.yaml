fullnameOverride: ws

replicaCount: 1

image:
  repository: ghcr.io/kylerloucks/k8s-platform/ws
  pullPolicy: IfNotPresent

ingress:
  enabled: true
  # Single ALB + path routing setup:
  # - one shared host across web/api/ws
  # - ws handles /ws*
  className: alb
  annotations:
    alb.ingress.kubernetes.io/group.name: platform-dev-us
    alb.ingress.kubernetes.io/scheme: internet-facing
    alb.ingress.kubernetes.io/target-type: ip
    alb.ingress.kubernetes.io/listen-ports: "[{\"HTTP\":80}]"
  hosts:
    - paths:
        - path: /ws
          pathType: Prefix

autoscaling:
  enabled: true
  minReplicas: 1
  maxReplicas: 2
  targetCPUUtilizationPercentage: 65

resources:
  requests:
    cpu: 50m
    memory: 128Mi
  limits:
    cpu: 500m
    memory: 256Mi

podAnnotations:
  environment: dev-us

config:
  ENV_NAME: dev-us
  PORT: "8000"
  # DB_* from External Secrets: credentials via RDS-managed secret; host via hostRemoteRef.
  DB_PORT: "5432"
  DB_NAME: platform
  # Must match the browser origin that serves the SPA.
  WS_ALLOWED_ORIGINS: "http://app.dev-us.local"
  REDIS_URL: redis://redis.dev-redis.svc.cluster.local:6379/0

secrets: {}

externalSecret:
  enabled: true
  secretStoreRef:
    name: aws-secrets-manager-cluster-secretstore
    kind: ClusterSecretStore
  dataFromFind:
    path: rds!
    tags:
      "platform:instance-id": platform
  hostRemoteRef:
    key: platform/dev/rds-host
    property: host
  data: []
