fullnameOverride: worker

replicaCount: 1

image:
  repository: ghcr.io/kylerloucks/k8s-platform/worker
  pullPolicy: IfNotPresent

ingress:
  enabled: false

autoscaling:
  enabled: false

resources:
  requests:
    cpu: 25m
    memory: 64Mi
  limits:
    cpu: 200m
    memory: 128Mi

podAnnotations:
  environment: dev-us

config:
  ENV_NAME: dev-us
  REDIS_ADDR: redis.dev-redis.svc.cluster.local:6379
  ADMIN_PORT: "8080"
  TICK_INTERVAL: 15s
  # DB_* from External Secrets: credentials via RDS-managed secret; host via hostRemoteRef.
  DB_PORT: "5432"
  DB_NAME: platform
  JOB_PROCESS_SECONDS: "2"

secrets: {}

externalSecret:
  enabled: true
  secretStoreRef:
    name: aws-secrets-manager-cluster-secretstore
    kind: ClusterSecretStore
  dataFromFind:
    path: rds!
    tags:
      "platform:instance-id": platform
  hostRemoteRef:
    key: platform/dev/rds-host
    property: host
  data: []
