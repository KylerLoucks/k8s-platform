replicaCount: 1

image:
  # Matches CI: ghcr.io/<repo>/web:<tag> (apps/web)
  repository: ghcr.io/kylerloucks/k8s-platform/web
  pullPolicy: IfNotPresent

# Browser-visible API URL injected into window.__API_BASE__.
# Empty string means same-origin relative path (/api), which works best with
# single-ALB path routing and avoids cross-origin issues in dev.
apiPublicUrl: ""

# Browser-visible WS URL injected into window.__WS_BASE__.
# Empty string makes the app derive ws(s)://<current-host>/ws at runtime.
wsPublicUrl: ""

ingress:
  enabled: true
  # Single ALB + path routing setup:
  # - web handles / (and SPA routes)
  # - api handles /api
  # - ws handles /ws
  className: alb
  annotations:
    alb.ingress.kubernetes.io/group.name: platform-dev-us
    alb.ingress.kubernetes.io/group.order: "30"
    alb.ingress.kubernetes.io/scheme: internet-facing
    alb.ingress.kubernetes.io/target-type: ip
    alb.ingress.kubernetes.io/listen-ports: "[{\"HTTP\":80}]"
  hosts:
    - paths:
        - path: /
          pathType: Prefix

autoscaling:
  enabled: true
  minReplicas: 1
  maxReplicas: 2
  targetCPUUtilizationPercentage: 70

resources:
  requests:
    cpu: 50m
    memory: 64Mi
  limits:
    cpu: 200m
    memory: 128Mi

podAnnotations:
  environment: dev-us

config:
  ENV_NAME: dev-us
