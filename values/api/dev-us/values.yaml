fullnameOverride: api

replicaCount: 1

image:
  repository: ghcr.io/kylerloucks/k8s-platform/api
  pullPolicy: IfNotPresent

ingress:
  enabled: true
  # Single ALB + path routing setup:
  # - one shared host across web/api/ws
  # - api handles /api*
  className: alb
  annotations:
    alb.ingress.kubernetes.io/group.name: platform-dev-us
    alb.ingress.kubernetes.io/scheme: internet-facing
    alb.ingress.kubernetes.io/target-type: ip
    alb.ingress.kubernetes.io/listen-ports: "[{\"HTTP\":80}]"
  hosts:
    - paths:
        - path: /api
          pathType: Prefix

autoscaling:
  enabled: true
  minReplicas: 1
  maxReplicas: 2
  targetCPUUtilizationPercentage: 65


resources:
  requests:
    cpu: 50m
    memory: 128Mi
  limits:
    cpu: 500m
    memory: 256Mi

podAnnotations:
  environment: dev-us

config:
  ENV_NAME: dev-us
  PORT: "8000"
  # DB_USER, DB_PASSWORD from RDS-managed SM secret (dataFrom.find). DB_HOST from separate SM secret (hostRemoteRef).
  DB_PORT: "5432"
  DB_NAME: platform
  # Must match the browser origin that serves the SPA.
  CORS_ALLOW_ORIGIN: "http://app.dev-us.local"
  REDIS_ADDR: redis.dev-redis.svc.cluster.local:6379

secrets: {}

externalSecret:
  enabled: true
  secretStoreRef:
    name: aws-secrets-manager-cluster-secretstore
    kind: ClusterSecretStore
  dataFromFind:
    path: rds!
    tags:
      identifier: platform
  hostRemoteRef:
    key: platform/dev/rds-host
    property: host
  data: []
