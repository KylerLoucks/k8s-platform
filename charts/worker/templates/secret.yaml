{{- if not .Values.externalSecret.enabled }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "platform-worker.fullname" . }}
  labels:
    {{- include "platform-worker.labels" . | nindent 4 }}
type: Opaque
stringData:
  {{- range $key, $val := .Values.secrets }}
  {{ $key }}: {{ tpl ($val | toString) $ | quote }}
  {{- end }}
{{- end }}
