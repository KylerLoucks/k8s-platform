apiVersion: v1
kind: Service
metadata:
  name: {{ include "platform-ws.fullname" . }}
  labels:
    {{- include "platform-ws.labels" . | nindent 4 }}
spec:
  type: {{ .Values.service.type }}
  selector:
    {{- include "platform-ws.selectorLabels" . | nindent 4 }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.service.targetPort }}
      protocol: TCP
      name: http
