{{- if .Values.externalSecret.enabled }}
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: {{ include "platform-ws.fullname" . }}
  labels:
    {{- include "platform-ws.labels" . | nindent 4 }}
  annotations:
    argocd.argoproj.io/sync-wave: "-1"
spec:
  refreshInterval: {{ .Values.externalSecret.refreshInterval | quote }}
  secretStoreRef:
    name: {{ .Values.externalSecret.secretStoreRef.name | quote }}
    kind: {{ .Values.externalSecret.secretStoreRef.kind | quote }}
{{- if .Values.externalSecret.dataFromFind }}
{{- if .Values.externalSecret.hostRemoteRef.key }}
  data:
    - secretKey: rds_host
      remoteRef:
        key: {{ tpl (.Values.externalSecret.hostRemoteRef.key | toString) $ | quote }}
        {{- if .Values.externalSecret.hostRemoteRef.property }}
        property: {{ tpl (.Values.externalSecret.hostRemoteRef.property | toString) $ | quote }}
        {{- end }}
{{- end }}
  dataFrom:
    - find:
        path: {{ .Values.externalSecret.dataFromFind.path | quote }}
        tags:
          {{- range $k, $v := .Values.externalSecret.dataFromFind.tags }}
          {{ $k | quote }}: {{ $v | quote }}
          {{- end }}
{{- else }}
  data:
    {{- range .Values.externalSecret.data }}
    - secretKey: {{ .secretKey | quote }}
      remoteRef:
        key: {{ tpl (.remoteRef.key | toString) $ | quote }}
        {{- if .remoteRef.property }}
        property: {{ tpl (.remoteRef.property | toString) $ | quote }}
        {{- end }}
    {{- end }}
{{- end }}
  target:
    name: {{ include "platform-ws.fullname" . }}
    creationPolicy: Owner
{{- if .Values.externalSecret.dataFromFind }}
    template:
      mergePolicy: Replace
      engine: gotemplate
      data:
{{- if .Values.externalSecret.hostRemoteRef.key }}
        DB_HOST: {{ printf "{{ index . \"rds_host\" }}" | quote }}
{{- end }}
        DB_USER: {{ printf "{{ index . \"username\" }}" | quote }}
        DB_PASSWORD: {{ printf "{{ index . \"password\" }}" | quote }}
{{- end }}
{{- end }}
