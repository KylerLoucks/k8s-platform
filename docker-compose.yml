# Local stack: Postgres + Redis + api (Alembic migrations on api start) + ws + worker + web.
# Usage: docker compose up --build
# UI: http://localhost:3000  |  API: http://localhost:8000  |  WS: ws://localhost:8001

name: k8s-platform-local

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: platform
      POSTGRES_PASSWORD: platform
      POSTGRES_DB: platform
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U platform -d platform"]
      interval: 3s
      timeout: 3s
      retries: 20

  redis:
    image: redis:7.2-alpine
    ports:
      - "6379:6379"
    command: ["redis-server", "--save", "", "--appendonly", "no"]

  api:
    build:
      context: ./apps/api
    environment:
      DB_HOST: postgres
      DB_PORT: "5432"
      DB_NAME: platform
      DB_USER: platform
      DB_PASSWORD: platform
      DB_SSLMODE: disable
      REDIS_ADDR: redis:6379
      CORS_ALLOW_ORIGIN: "http://localhost:3000"
      PORT: "8000"
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/healthz')\"",
        ]
      interval: 5s
      timeout: 5s
      retries: 15
      start_period: 45s

  ws:
    build:
      context: ./apps/ws
    environment:
      DB_HOST: postgres
      DB_PORT: "5432"
      DB_NAME: platform
      DB_USER: platform
      DB_PASSWORD: platform
      DB_SSLMODE: disable
      REDIS_URL: redis://redis:6379/0
      WS_ALLOWED_ORIGINS: "http://localhost:3000"
      PORT: "8000"
    ports:
      - "8001:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
      api:
        condition: service_healthy

  worker:
    build:
      context: ./apps/worker
    environment:
      DB_HOST: postgres
      DB_PORT: "5432"
      DB_NAME: platform
      DB_USER: platform
      DB_PASSWORD: platform
      DB_SSLMODE: disable
      REDIS_ADDR: redis:6379
      ADMIN_PORT: "8080"
      JOB_PROCESS_SECONDS: "2"
      TICK_INTERVAL: 15s
    ports:
      - "8081:8080"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
      api:
        condition: service_healthy

  web:
    build:
      context: ./apps/web
    environment:
      # Written into api-config.js at container start (see apps/web/docker-entrypoint.sh).
      API_PUBLIC_BASE: "http://localhost:8000"
      WS_PUBLIC_BASE: "ws://localhost:8001"
    ports:
      - "3000:80"
    depends_on:
      api:
        condition: service_healthy
      ws:
        condition: service_started
